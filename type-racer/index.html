<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Type Racer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      color: #e2e2e8;
      font-family: 'Courier New', monospace;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 40px;
    }

    #stats {
      display: flex;
      gap: 48px;
      margin-bottom: 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2.4rem;
      font-weight: bold;
      color: #e2e2e8;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-top: 4px;
    }

    #quote-box {
      max-width: 680px;
      width: 100%;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
      line-height: 2;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      min-height: 120px;
    }

    .char {
      position: relative;
    }

    .char.correct { color: #7ec8a0; }
    .char.wrong   { color: #e06c75; background: rgba(224,108,117,0.15); border-radius: 2px; }
    .char.pending { color: #555; }
    .char.cursor::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 100%;
      height: 2px;
      background: #7c9cf8;
      border-radius: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    #input {
      max-width: 680px;
      width: 100%;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      padding: 14px 18px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #e2e2e8;
      outline: none;
      caret-color: #7c9cf8;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: #3a3a50; }
    #input.error  { border-color: #e06c75; }

    #result {
      margin-top: 32px;
      text-align: center;
      display: none;
    }

    #result h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    #result p { color: #666; font-size: 0.85rem; margin-bottom: 20px; }

    button {
      background: #7c9cf8;
      color: #0f0f13;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover  { background: #99b2fa; }
    button:active { transform: scale(0.97); }

    #high-score {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.1em;
    }

    #high-score span { color: #7ec8a0; }
  </style>
</head>
<body>

<h1>Type Racer</h1>

<div id="stats">
  <div class="stat">
    <div class="stat-value" id="wpm-display">—</div>
    <div class="stat-label">WPM</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="acc-display">—</div>
    <div class="stat-label">Accuracy</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="timer-display">—</div>
    <div class="stat-label">Seconds</div>
  </div>
</div>

<div id="quote-box"></div>
<input id="input" type="text" placeholder="Start typing to begin…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

<div id="result">
  <h2 id="result-wpm"></h2>
  <p id="result-acc"></p>
  <button id="next-btn">Next Quote →</button>
</div>

<div id="high-score">Best: <span id="best-display">—</span> WPM</div>

<script>
const QUOTES = [
  "The only way to do great work is to love what you do.",
  "In the middle of every difficulty lies opportunity.",
  "It does not matter how slowly you go as long as you do not stop.",
  "Life is what happens when you are busy making other plans.",
  "The future belongs to those who believe in the beauty of their dreams.",
  "You miss one hundred percent of the shots you do not take.",
  "Whether you think you can or think you cannot, you are right.",
  "Two roads diverged in a wood and I took the one less traveled by.",
  "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.",
  "In three words I can sum up everything I have learned about life: it goes on.",
  "If you tell the truth you do not have to remember anything.",
  "A friend is someone who knows all about you and still loves you.",
  "To live is the rarest thing in the world, most people just exist.",
  "Always forgive your enemies, nothing annoys them so much.",
  "I am so clever that sometimes I do not understand a single word of what I am saying.",
  "The person who has not panicked has not been paying attention.",
  "We accept the love we think we deserve.",
  "Not all those who wander are lost.",
  "It is our choices that show what we truly are, far more than our abilities.",
  "Do not go where the path may lead, go instead where there is no path and leave a trail.",
];

let quote = '';
let startTime = null;
let timerInterval = null;
let totalTyped = 0;
let errors = 0;
let finished = false;

const quoteBox = document.getElementById('quote-box');
const input = document.getElementById('input');
const wpmDisplay = document.getElementById('wpm-display');
const accDisplay = document.getElementById('acc-display');
const timerDisplay = document.getElementById('timer-display');
const result = document.getElementById('result');
const resultWpm = document.getElementById('result-wpm');
const resultAcc = document.getElementById('result-acc');
const nextBtn = document.getElementById('next-btn');
const bestDisplay = document.getElementById('best-display');

let best = parseInt(localStorage.getItem('tr-best') || '0');
bestDisplay.textContent = best > 0 ? best : '—';

function pickQuote() {
  return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

function renderQuote(typed) {
  quoteBox.innerHTML = '';
  for (let i = 0; i < quote.length; i++) {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = quote[i];
    if (i < typed.length) {
      span.classList.add(typed[i] === quote[i] ? 'correct' : 'wrong');
    } else if (i === typed.length) {
      span.classList.add('pending', 'cursor');
    } else {
      span.classList.add('pending');
    }
    quoteBox.appendChild(span);
  }
}

function calcWPM(elapsed) {
  const minutes = elapsed / 60000;
  return Math.round((quote.length / 5) / minutes);
}

function calcAcc() {
  if (totalTyped === 0) return 100;
  return Math.max(0, Math.round(((totalTyped - errors) / totalTyped) * 100));
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    timerDisplay.textContent = (elapsed / 1000).toFixed(1);
    wpmDisplay.textContent = calcWPM(elapsed);
    accDisplay.textContent = calcAcc() + '%';
  }, 100);
}

function finish() {
  finished = true;
  clearInterval(timerInterval);
  input.disabled = true;

  const elapsed = Date.now() - startTime;
  const wpm = calcWPM(elapsed);
  const acc = calcAcc();

  if (wpm > best) {
    best = wpm;
    localStorage.setItem('tr-best', best);
    bestDisplay.textContent = best;
  }

  resultWpm.textContent = wpm + ' WPM';
  resultAcc.textContent = acc + '% accuracy · ' + (elapsed / 1000).toFixed(2) + 's';
  result.style.display = 'block';
}

function newRound() {
  quote = pickQuote();
  finished = false;
  startTime = null;
  totalTyped = 0;
  errors = 0;
  clearInterval(timerInterval);

  input.value = '';
  input.disabled = false;
  input.classList.remove('error');
  result.style.display = 'none';
  wpmDisplay.textContent = '—';
  accDisplay.textContent = '—';
  timerDisplay.textContent = '—';

  renderQuote('');
  input.focus();
}

input.addEventListener('input', (e) => {
  if (finished) return;
  const typed = e.target.value;

  if (!startTime && typed.length > 0) startTimer();

  totalTyped = Math.max(totalTyped, typed.length);

  // count errors as chars typed that don't match
  let errs = 0;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] !== quote[i]) errs++;
  }
  errors = errs;

  input.classList.toggle('error', errs > 0);
  renderQuote(typed);

  if (typed === quote) finish();
});

nextBtn.addEventListener('click', newRound);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') { e.preventDefault(); newRound(); }
});

newRound();
</script>
</body>
</html>
